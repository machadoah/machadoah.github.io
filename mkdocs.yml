site_name: machadoah
site_url: https://machadoah.tech/
repo_url: https://github.com/machadoah/machadoah.github.io/
repo_name: Machadoah
theme:
  name: material
  locale: pt_BR
  palette:
    - scheme: default
      primary: 'white'
      accent: 'gray'
      background: 'black'
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Toggle dark mode
markdown_extensions:
  - codehilite
  - admonition
nav:
  - Home: index.md
  - Educação: educacao.md
  - Experiências: experiencias.md
  - Habilidades: habilidades.md
